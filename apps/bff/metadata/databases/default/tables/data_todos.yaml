table:
  name: todos
  schema: data
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        user_id: x-hasura-User-Id
      columns:
        - notes
        - title
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - notes
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      limit: 100
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - notes
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
