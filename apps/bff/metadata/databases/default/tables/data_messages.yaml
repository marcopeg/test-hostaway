table:
  name: messages
  schema: data
object_relationships:
  - name: guest
    using:
      foreign_key_constraint_on: guest_id
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
  - name: thread
    using:
      foreign_key_constraint_on: thread_id
select_permissions:
  - role: user
    permission:
      columns:
        - guest_id
        - id
        - message
        - operator_id
        - sent_at
        - tenant_id
        - thread_id
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
