table:
  name: guests
  schema: data
object_relationships:
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
array_relationships:
  - name: messages
    using:
      foreign_key_constraint_on:
        column: guest_id
        table:
          name: messages
          schema: data
select_permissions:
  - role: user
    permission:
      columns:
        - icon
        - id
        - name
        - tenant_id
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
