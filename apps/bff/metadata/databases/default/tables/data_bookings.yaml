table:
  name: bookings
  schema: data
object_relationships:
  - name: channel
    using:
      foreign_key_constraint_on: channel_id
  - name: listing
    using:
      foreign_key_constraint_on: listing_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
array_relationships:
  - name: threads
    using:
      foreign_key_constraint_on:
        column: booking_id
        table:
          name: threads
          schema: data
select_permissions:
  - role: user
    permission:
      columns:
        - channel_id
        - end_date
        - id
        - listing_id
        - stage
        - start_date
        - tenant_id
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
