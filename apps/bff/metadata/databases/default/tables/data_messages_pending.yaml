table:
  name: messages_pending
  schema: data
object_relationships:
  - name: operator
    using:
      foreign_key_constraint_on: operator_id
  - name: tenant
    using:
      foreign_key_constraint_on: tenant_id
  - name: thread
    using:
      foreign_key_constraint_on: thread_id
insert_permissions:
  - role: user
    permission:
      check:
        thread:
          tenant_id:
            _eq: X-Hasura-Tenant-Id
      columns:
        - message
        - sent_at
        - thread_id
      set:
        operator_id: x-hasura-user-id
        tenant_id: x-hasura-tenant-id
select_permissions:
  - role: user
    permission:
      allow_aggregations: true
      columns:
        - id
        - message
        - operator_id
        - sent_at
        - tenant_id
        - thread_id
        - updated_at
      filter:
        tenant_id:
          _eq: X-Hasura-Tenant-Id
