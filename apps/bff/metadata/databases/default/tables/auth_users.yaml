table:
  name: users
  schema: auth
array_relationships:
  - name: messages
    using:
      foreign_key_constraint_on:
        column: operator_id
        table:
          name: messages
          schema: data
  - name: pending_messages
    using:
      foreign_key_constraint_on:
        column: operator_id
        table:
          name: messages_pending
          schema: data
select_permissions:
  - role: user
    permission:
      columns:
        - icon
        - id
        - name
        - updated_at
      filter:
        _or:
          - id:
              _eq: X-Hasura-User-Id
          - messages:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
          - pending_messages:
              tenant_id:
                _eq: X-Hasura-Tenant-Id
