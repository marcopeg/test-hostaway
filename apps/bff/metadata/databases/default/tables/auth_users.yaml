table:
  name: users
  schema: auth
array_relationships:
  - name: messages
    using:
      foreign_key_constraint_on:
        column: operator_id
        table:
          name: messages
          schema: data
  - name: pending_messages
    using:
      foreign_key_constraint_on:
        column: operator_id
        table:
          name: messages_pending
          schema: data
